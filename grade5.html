<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JBMB0SY8T6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JBMB0SY8T6');
    </script>

    <title>IQ MIND - GRADE 5</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #001f3f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #00a8ff; width: 100%; max-width: 400px; border-radius: 30px; padding: 25px; text-align: center; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.4); position: relative; }
        .header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }
        .logo-small { width: 60px; height: 60px; border-radius: 50%; background: white; margin-right: 15px; border: 2px solid white; object-fit: cover; cursor: pointer; }
        .header-text { text-align: left; }
        .header-text strong { font-size: 22px; display: block; }
        .header-text small { font-size: 14px; opacity: 0.9; }
        .q-count { font-size: 18px; margin-bottom: 10px; font-weight: 500; }
        .question { font-size: 19px; font-weight: bold; margin-bottom: 25px; line-height: 1.5; min-height: 70px; text-align: left; }
        .option { background: white; color: #333; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; border: none; width: 100%; font-size: 16px; text-align: left; padding-left: 25px; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .next-btn { background: #1877F2; color: white; padding: 16px; width: 100%; border: none; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 17px; display: none; }
        .result-box { text-align: left; background: white; color: #333; padding: 20px; border-radius: 20px; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .summary-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 14px; }
        .home-btn { background: white; color: #333; padding: 15px; width: 100%; border: 1px solid #ddd; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        
        /* නව බටන් එකේ ස්ටයිල් එක */
        .retry-btn { background: #2ecc71; color: white; padding: 15px; width: 100%; border: none; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .follow-btn { display: inline-block; padding: 12px 24px; background-color: #1877F2; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 80%; }
        .follow-btn:hover { background-color: #145dbf; transform: scale(1.05); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" class="logo-small" onclick="goHome()" alt="Logo">
        <div class="header-text">
            <strong>IQ MIND</strong>
            <small>GRADE 5 </small>
        </div>
    </div>

    <div id="quiz-area">
        <div class="q-count">Question <span id="current-q-num">1</span> of 10</div>
        <div class="question" id="question-text"></div>
        <div id="options-list"></div>
        <button id="next-btn" class="next-btn" onclick="handleNext()">NEXT QUESTION</button>
    </div>

    <div id="result-area" class="hidden">
        <h2>Quiz Completed!</h2>
        <h3 id="final-score"></h3>
        <div class="result-box" id="summary-content"></div>
        
        <!-- නව බොත්තම මෙතැනට ඇතුළත් කර ඇත -->
        <button class="retry-btn" onclick="restartQuiz()">තවත් ගැටලු 10ක් උත්සහ කරන්න</button>
        
        <a href="https://web.facebook.com/iqmind.lk/" target="_blank" class="follow-btn">Follow us on IQ Mind</a>
        <button class="home-btn" onclick="goHome()">🏠 Home</button>
    </div>
</div>

<script>
function goHome(){ window.location.href = "index.html"; }

const quizData = [
    { q: "මීටර් 1000ක් යනු කිලෝමීටර් කීයක්ද?", options: ["1 km", "10 km", "100 km", "0.1 km"], correct: 0 },
    { q: "ශ්‍රි ලංකාවේ ප්‍රධානතම ආගමික මධ්‍යස්ථානයක් වන 'දළදා මාළිගාව' පිහිටා ඇත්තේ කුමන නගරයේද?", options: ["අනුරාධපුරය", "පොළොන්නරුව", "මහනුවර", "කතරගම"], correct: 2 },
    { q: "6, 12, 18, 24 රටාවේ ඊළඟ සංඛ්‍යාව කුමක්ද?", options: ["28", "30", "32", "36"], correct: 1 },
    { q: "ලීටර් 1ක මිලිලීටර් කීයක් තිබේද?", options: ["100 ml", "500 ml", "1000 ml", "10 ml"], correct: 2 },
    { q: "ශ්‍රී ලංකාවේ වැඩිම දිස්ත්‍රික්ක සංඛ්‍යාවක් ඇති පළාත කුමක්ද?", options: ["බස්නාහිර", "උතුරු", "මධ්‍යම", "වයඹ"], correct: 1 },
    { q: "පහත වචන අතරින් නිවැරදි අක්ෂර වින්‍යාසය සහිත වචනය තෝරන්න.", options: ["ප්‍රදර්ශණය", "ප්‍රදර්ශනය", "ප්ලදර්ශනය", "ප්‍රධර්ශනය"], correct: 1 },
    { q: "පරිසරයේ ඇති කාබන්ඩයොක්සයිඩ් අවශෝෂණය කර ඔක්සිජන් මුදා හරින්නේ කවුද?", options: ["සතුන්", "මිනිසුන්", "ශාක", "වාහන"], correct: 2 },
    { q: "පැය භාගයකට මිනිත්තු කීයක් තිබේද?", options: ["15", "30", "45", "60"], correct: 1 },
    { q: "මිනිත්තු 120ක් යනු පැය කීයක්ද?", options: ["පැය 1", "පැය 2", "පැය 3", "පැය 4"], correct: 1 },
    { q: "පහත සංඛ්‍යා අතරින් 5න් බෙදූ විට ඉතිරියක් රහිතව බෙදිය හැකි සංඛ්‍යාව කුමක්ද?", options: ["123", "456", "780", "902"], correct: 2 },
    { q: "පෙරවරු 10.30 සිට පස්වරු 1.30 දක්වා ගත වූ කාලය කොපමණද?", options: ["පැය 2", "පැය 2 විනාඩි 30", "පැය 3", "පැය 4"], correct: 2 },
    { q: "සමපාද ත්‍රිකෝණයක ඇති සමාන පාද ගණන කීයද?", options: ["1", "2", "3", "4"], correct: 2 },
    { q: "රුපියල් 12.50ක් වටිනා පැන්සල් 4ක් මිලදී ගැනීමට අවශ්‍ය මුදල කොපමණද?", options: ["රු. 40", "රු. 45", "රු. 50", "රු. 60"], correct: 2 },
    { q: "'ගුණ යහපත් ළමයා' මෙහි විශේෂණ පදය කුමක්ද?", options: ["ළමයා", "ගුණ යහපත්", "යහපත් ළමයා", "ගුණ"], correct: 1 },
    { q: "ශ්‍රී ලංකාවේ ජාතික පුෂ්පය කුමක්ද?", options: ["නෙළුම්", "මානෙල්", "නිල් මානෙල්", "පිච්ච"], correct: 2 },
    { q: "අපේ රටේ ජාතික කොඩියේ සිටින සිංහයාගේ දකුණු අතේ ඇති වස්තුව කුමක්ද?", options: ["කඩුව", "ධජය", "මලක්", "පලිහක්"], correct: 0 },
    { q: "අද සඳුදා නම්, අනිද්දා දිනය කුමක්ද?", options: ["අඟහරුවාදා", "බදාදා", "බ්‍රහස්පතින්දා", "ඉරිදා"], correct: 1 },
    { q: "ත්‍රිකෝණයක ඇති ශීර්ෂ ගණන කීයද?", options: ["2", "3", "4", "5"], correct: 1 },
    { q: "ශ්‍රී ලංකාවේ දිගම ගඟ කුමක්ද?", options: ["කළු ගඟ", "කැලණි ගඟ", "නිල්වලා ගඟ", "මහවැලි ගඟ"], correct: 3 }
];

let questions = [];
let currentIdx = 0;
let score = 0;
let answersLog = [];

function prepareQuestions() {
    let allQuestions = [...quizData];
    for (let i = allQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
    }
    questions = allQuestions.slice(0, 10);
}

function loadQuestion(){
    const q = questions[currentIdx];
    document.getElementById("current-q-num").innerText = currentIdx + 1;
    document.getElementById("question-text").innerText = q.q;
    const list = document.getElementById("options-list");
    list.innerHTML = "";
    document.getElementById("next-btn").style.display = "none";
    q.options.forEach((opt,i)=>{
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => selectOption(i,btn);
        list.appendChild(btn);
    });
}

function selectOption(index,element){
    const correctIdx = questions[currentIdx].correct;
    const options = document.querySelectorAll(".option");
    options.forEach(b=>b.style.pointerEvents="none");
    let isCorrect = index === correctIdx;
    if(isCorrect){
        element.classList.add("correct");
        score++;
    } else {
        element.classList.add("wrong");
        options[correctIdx].classList.add("correct");
    }
    answersLog.push({ q: questions[currentIdx].q, correct: questions[currentIdx].options[correctIdx], isCorrect: isCorrect });
    document.getElementById("next-btn").style.display = "block";
}

function handleNext(){
    currentIdx++;
    if(currentIdx < questions.length){
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults(){
    document.getElementById("quiz-area").classList.add("hidden");
    document.getElementById("result-area").classList.remove("hidden");
    const percent = Math.round((score/questions.length)*100);
    document.getElementById("final-score").innerText = `Score: ${score}/${questions.length} (${percent}%)`;
    let html = "<strong>Wrong Answers Only:</strong><br><br>";
    let hasWrong = false;
    answersLog.forEach((item)=>{
        if(!item.isCorrect){
            hasWrong = true;
            html += `<div class='summary-item'>${item.q}<br><span style='color:red;font-weight:bold'>Correct: ${item.correct}</span></div>`;
        }
    });
    document.getElementById("summary-content").innerHTML = hasWrong ? html : "All correct! Well done.";
}

// නැවත ආරම්භ කිරීමේ function එක
function restartQuiz() {
    currentIdx = 0;
    score = 0;
    answersLog = [];
    document.getElementById("result-area").classList.add("hidden");
    document.getElementById("quiz-area").classList.remove("hidden");
    prepareQuestions();
    loadQuestion();
}

prepareQuestions();
loadQuestion();
</script>

</body>
</html>
