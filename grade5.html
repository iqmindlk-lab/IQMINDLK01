<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JBMB0SY8T6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-JBMB0SY8T6');
    </script>
    
    <title>IQ MIND - ශිෂ්‍යත්ව අනුමාන ප්‍රශ්න</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #001f3f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #00a8ff; width: 100%; max-width: 500px; border-radius: 30px; padding: 25px; text-align: center; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }
        .logo-small { width: 60px; height: 60px; border-radius: 50%; background: white; margin-right: 15px; border: 2px solid white; object-fit: cover; }
        .header-text { text-align: left; }
        .header-text strong { font-size: 22px; display: block; }
        .header-text small { font-size: 14px; opacity: 0.9; }

        .q-count { font-size: 18px; margin-bottom: 10px; font-weight: 500; }
        .question { font-size: 19px; font-weight: bold; margin-bottom: 25px; line-height: 1.5; min-height: 70px; text-align: left; }
        .option { background: white; color: #333; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; border: none; width: 100%; font-size: 16px; text-align: left; padding-left: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        
        .next-btn { background: #1877F2; color: white; padding: 16px; width: 100%; border: none; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 17px; display: none; }
        
        .result-box { text-align: left; background: white; color: #333; padding: 20px; border-radius: 20px; margin-top: 20px; max-height: 350px; overflow-y: auto; }
        .summary-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 14px; }
        
        .button-container { text-align: center; width: 100%; margin-top: 20px; }
        .fb-btn { background: #1877F2; color: white; padding: 15px 30px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; display: inline-block; text-decoration: none; transition: 0.3s; }
        .fb-btn:hover { background: #145dbf; transform: scale(1.03); }
        
        .home-btn { background: white; color: #333; padding: 15px; width: 100%; border: 1px solid #ddd; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; display: block; text-decoration: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" class="logo-small" alt="Logo">
        <div class="header-text">
            <strong>IQ MIND</strong>
            <small>ශිෂ්‍යත්ව අනුමාන ප්‍රශ්නාවලිය</small>
        </div>
    </div>

    <div id="quiz-area">
        <div class="q-count">ප්‍රශ්නය <span id="current-q-num">1</span> / 20</div>
        <div class="question" id="question-text">පූරණය වෙමින් පවතී...</div>
        <div id="options-list"></div>
        <button id="next-btn" class="next-btn" onclick="handleNext()">මීළඟ ප්‍රශ්නය</button>
    </div>

    <div id="result-area" class="hidden">
        <h2 style="margin:0; font-size: 26px;">ප්‍රතිඵලය</h2>
        <h3 id="final-score" style="color: #fff; background: rgba(0,0,0,0.2); display: inline-block; padding: 10px 20px; border-radius: 10px; margin: 15px 0;">Score: 0%</h3>
        
        <div class="result-box" id="summary-content"></div>
        
        <div class="button-container">
            <a href="https://www.facebook.com/iqmind.lk" target="_blank" class="fb-btn">
                Follow IQ MIND on Facebook
            </a>
        </div>
        
        <button class="home-btn" onclick="window.location.reload()">නැවත උත්සාහ කරන්න</button>
    </div>
</div>

<script>
    const questions = [
        { q: "ශ්‍රී ලංකාවේ ජාතික උරුමයක් ලෙස සැලකෙන 'සිංහරාජ වනාන්තරය' වැඩිපුරම ව්‍යාප්ත වී ඇත්තේ කුමන දිස්ත්‍රික්කයේද?", options: ["රත්නපුර", "ගාල්ල", "මාතර"], correct: 0 },
        { q: "රාත්‍රී කාලයේදී පිපෙන, සුදු පැහැති සහ සුවඳවත් මලක් වන්නේ මෙයින් කුමක්ද?", options: ["නෙළුම්", "කඩපුල්", "සූරියකාන්ත"], correct: 1 },
        { q: "සූර්යයාගෙන් ලැබෙන අහිතකර කිරණවලින් පෘථිවිය ආරක්ෂා කරන වායු ස්ථරය කුමක්ද?", options: ["නයිට්‍රජන් ස්ථරය", "ඔක්සිජන් ස්ථරය", "ඕසෝන් ස්ථරය"], correct: 2 },
        { q: "ලෝක ළමා දිනය යෙදී ඇත්තේ කුමන මාසයේද?", options: ["මැයි 1", "ඔක්තෝබර් 1", "නොවැම්බර් 14"], correct: 1 },
        { q: "තැපැල් සේවාව හඳුන්වා දීමට පෙර ලංකාවේ පණිවුඩ හුවමාරුව සඳහා බහුලවම යොදාගත් සත්වයා කවුද?", options: ["පරෙවියා", "අශ්වයා", "අලියා"], correct: 0 },
        { q: "රුපියල් 500 නෝට්ටුවක් මාරු කළ විට රුපියල් 20 නෝට්ටු කීයක් ලැබේද?", options: ["20ක්", "25ක්", "50ක්"], correct: 1 },
        { q: "පෙට්ටියක පැන්සල් 12ක් ඇත. එවැනි පෙට්ටි 8ක ඇති මුළු පැන්සල් ගණන කීයද?", options: ["86", "92", "96"], correct: 2 },
        { q: "මීටර් 100ක රිබන් පටියකින් මීටර් 5 බැගින් වූ කැබලි කීයක් කැපිය හැකිද?", options: ["10ක්", "20ක්", "25ක්"], correct: 1 },
        { q: "උදේ 8:30 සිට පස්වරු 1:30 දක්වා ගත වී ඇති කාලය කොපමණද?", options: ["පැය 4යි", "පැය 5යි", "පැය 6යි"], correct: 1 },
        { q: "5, 10, 20, 40, .... මෙම රටාවේ ඊළඟට එන අංකය කුමක්ද?", options: ["60", "80", "100"], correct: 1 },
        { q: "'අහස' යන්නට සමාන පදයක් නොවන්නේ මෙයින් කුමක්ද?", options: ["ගුවන", "නුබ", "පොළොව"], correct: 2 },
        { q: "'පොත' යන පදයේ බහු වචන රූපය කුමක්ද?", options: ["පොත්", "පොතවල්", "පොත් පත්"], correct: 0 },
        { q: "'ඉඟුරු දී ........... ගත්තා වගේ' මෙම ප්‍රස්තාව පිරුළ සම්පූර්ණ කිරීමට වඩාත්ම ගැලපෙන වචනය කුමක්ද?", options: ["මිරිස්", "පාන්", "දිවුල්"], correct: 2 },
        { q: "පහත වචන අකාරාදි පිළිවෙළට තිබෙන නිවැරදි පිළිවෙළ කුමක්ද? (අම්මා, ඇස, ඉර, උදෑසන)", options: ["අම්මා, ඇස, ඉර, උදෑසන", "ඇස, අම්මා, ඉර, උදෑසන", "ඉර, ඇස, අම්මා, උදෑසන"], correct: 0 },
        { q: "'ගොවියා කුඹුරට ...........' මෙහි හිස්තැනට වඩාත්ම ගැලපෙන ක්‍රියා පදය තෝරන්න.", options: ["ගියේය", "ගියහ", "ගියෝය"], correct: 0 },
        { q: "රූප සටහනක වෘත්ත 4ක් සහ ත්‍රිකෝණ 3ක් ඇත. එහි ඇති මුළු පාද ගණන කීයද? (වෘත්තයකට පාද නැත)", options: ["9", "12", "15"], correct: 0 },
        { q: "බල්ලාට බලු කූඩුව නම්, අශ්වයාට කුමක්ද?", options: ["ගාල", "ලැගුම්ගෙය", "ස්තාලය"], correct: 2 },
        { q: "අද බ්‍රහස්පතින්දා නම්, අනිද්දාට පෙර දින කුමන දිනයක්ද?", options: ["සිකුරාදා", "සෙනසුරාදා", "ඉරිදා"], correct: 0 },
        { q: "වෙනස් රූපය (වර්ගය) තෝරන්න: (කැරට්, අල, තක්කාලි, බීට්)", options: ["කැරට්", "තක්කාලි", "බීට්"], correct: 1 },
        { q: "ඉංග්‍රීසි හෝඩියේ 10 වැනි අකුර කුමක්ද?", options: ["I", "J", "K"], correct: 1 }
    ];

    let currentIdx = 0;
    let score = 0;
    let answersLog = [];

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById("current-q-num").innerText = currentIdx + 1;
        document.getElementById("question-text").innerText = q.q;
        const list = document.getElementById("options-list");
        list.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = (i+1) + ". " + opt;
            btn.onclick = () => selectOption(i, btn);
            list.appendChild(btn);
        });
    }

    function selectOption(index, element) {
        const correctIdx = questions[currentIdx].correct;
        const options = document.querySelectorAll(".option");
        options.forEach(btn => btn.style.pointerEvents = "none");

        if(index === correctIdx) {
            element.classList.add("correct");
            score++;
        } else {
            element.classList.add("wrong");
            options[correctIdx].classList.add("correct");
        }

        answersLog.push({ q: questions[currentIdx].q, correct: questions[currentIdx].options[correctIdx] });
        document.getElementById("next-btn").style.display = "block";
        if(currentIdx === questions.length - 1) document.getElementById("next-btn").innerText = "ප්‍රතිඵල බලන්න";
    }

    function handleNext() {
        currentIdx++;
        if(currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-area").classList.add("hidden");
        document.getElementById("result-area").classList.remove("hidden");
        const percent = Math.round((score / questions.length) * 100);
        document.getElementById("final-score").innerText = `නිවැරදි: ${score} / ${questions.length} (${percent}%)`;
        
        let summaryHtml = "<strong>පිළිතුරු සාරාංශය:</strong><br><br>";
        answersLog.forEach((item, i) => {
            summaryHtml += `<div class='summary-item'>${i+1}. ${item.q}<br><span style='color:#27ae60; font-weight:bold;'>නිවැරදි පිළිතුර: ${item.correct}</span></div>`;
        });
        document.getElementById("summary-content").innerHTML = summaryHtml;
    }

    loadQuestion();
</script>
</body>
</html>
