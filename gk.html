<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ MIND - Guru Vibagaya GK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #001f3f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: #00a8ff; width: 380px; border-radius: 25px; padding: 25px; text-align: center; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 15px; }
        .logo-small { width: 50px; height: 50px; border-radius: 50%; background: white; margin-right: 12px; }
        .q-count { font-size: 16px; margin-bottom: 10px; opacity: 0.9; }
        .question { font-size: 19px; font-weight: bold; margin-bottom: 20px; line-height: 1.5; min-height: 60px; }
        .option { background: white; color: #333; padding: 12px; margin: 8px 0; border-radius: 12px; cursor: pointer; font-weight: 500; transition: 0.2s; border: none; width: 100%; font-size: 15px; text-align: left; padding-left: 20px; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .next-btn { background: #1877F2; color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 16px; display: none; }
        .result-box { text-align: left; background: white; color: #333; padding: 15px; border-radius: 15px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .summary-item { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; font-size: 13px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" class="logo-small" alt="IQ MIND">
        <div style="text-align: left;"><strong>IQ MIND</strong><br><small>ගුරු විභාගය - සාමාන්‍ය දැනීම</small></div>
    </div>

    <div id="quiz-area">
        <div class="q-count">ප්‍රශ්නය <span id="current-q-num">1</span> / 20</div>
        <div class="question" id="question-text">ප්‍රශ්නය පූරණය වෙමින් පවතී...</div>
        <div id="options-list"></div>
        <button id="next-btn" class="next-btn" onclick="handleNext()">මීළඟ ප්‍රශ්නය</button>
    </div>

    <div id="result-area" class="hidden">
        <h2 style="margin:0;">ප්‍රතිඵලය</h2>
        <h3 id="final-score">Score: 0%</h3>
        <div class="result-box" id="summary-content"></div>
        <button class="next-btn" style="display:block;" onclick="window.location.href='index.html'">මුල් පිටුවට</button>
    </div>
</div>

<script>
    const questions = [
        { q: "නිදහස් අධ්‍යාපන පනත රාජ්‍ය මන්ත්‍රණ සභාවට ඉදිරිපත් කළ වර්ෂය වන්නේ?", options: ["1943", "1947", "1939", "1951"], correct: 0 },
        { q: "ශ්‍රී ලංකාවේ විවෘත විශ්වවිද්‍යාලය (OUSL) ආරම්භ කළ වර්ෂය කුමක්ද?", options: ["1978", "1980", "1982", "1972"], correct: 1 },
        { q: "ජාතික අධ්‍යාපන ආයතනය (NIE) පිහිටා ඇත්තේ කොහේද?", options: ["කොළඹ", "මහරගම", "නුගේගොඩ", "බත්තරමුල්ල"], correct: 1 },
        { q: "ළමුන් සඳහා වන අනිවාර්ය අධ්‍යාපන වයස් සීමාව වර්තමානයේ පවතින්නේ?", options: ["වයස අවුරුදු 5-14 දක්වා", "වයස අවුරුදු 5-16 දක්වා", "වයස අවුරුදු 6-16 දක්වා", "වයස අවුරුදු 5-18 දක්වා"], correct: 1 },
        { q: "ලෝක සාක්ෂරතා දිනය යෙදී ඇත්තේ කවදාටද?", options: ["සැප්තැම්බර් 08", "ඔක්තෝබර් 05", "ජූනි 12", "නොවැම්බර් 20"], correct: 0 },
        { q: "පාසලක 'ගුරු පැමිණීමේ ලේඛනය' භාරව කටයුතු කිරීමේ වගකීම ඇත්තේ කාටද?", options: ["විදුහල්පති", "නියෝජ්‍ය විදුහල්පති", "ලේඛකාධිකාරී", "අංශ ප්‍රධානියා"], correct: 1 },
        { q: "ශ්‍රී ලංකාවේ ප්‍රථම විශ්වවිද්‍යාලය ආරම්භ වූ වර්ෂය වන්නේ?", options: ["1942", "1921", "1950", "1901"], correct: 1 },
        { q: "ගුරුවරයෙකුට හිමි විය හැකි උපරිම අනියම් නිවාඩු (Casual Leave) සංඛ්‍යාව?", options: ["21", "20", "40", "10"], correct: 1 },
        { q: "පන්ති කාමරයක ඉගෙනුම්-ඉගැන්වීම් ක්‍රියාවලියේ 'කේන්ද්‍රය' විය යුත්තේ?", options: ["ගුරුවරයා", "විෂය මාලාව", "ශිෂ්‍යයා", "විදුහල්පති"], correct: 2 },
        { q: "ජාතික පාසල් පද්ධතිය පාලනය කරනු ලබන්නේ කා විසින්ද?", options: ["පළාත් අධ්‍යාපන දෙපාර්තමේන්තුව", "මධ්‍යම රජයේ අධ්‍යාපන අමාත්‍යාංශය", "කලාප අධ්‍යාපන කාර්යාලය", "පළාත් සභාව"], correct: 1 },
        { q: "ඉගෙනුම් ක්‍රියාවලියේදී 'සක්‍රීය ඉගෙනුම' (Active Learning) යන්නෙන් අදහස් වන්නේ?", options: ["ගුරුවරයාට සවන් දීම", "සටහන් පිටපත් කිරීම", "ප්‍රායෝගික ක්‍රියාකාරකම්වල නිරත වීම", "පොත් කියවීම"], correct: 2 },
        { q: "විෂය නිර්දේශයන් සැකසීමේ වගකීම පැවරී ඇති ආයතනය කුමක්ද?", options: ["විභාග දෙපාර්තමේන්තුව", "ජාතික අධ්‍යාපන ආයතනය", "අධ්‍යාපන ප්‍රකාශන දෙපාර්තමේන්තුව", "විශ්වවිද්‍යාල ප්‍රතිපාදන කොමිෂන් සභාව"], correct: 1 },
        { q: "පාසල් සංවර්ධන සමිතියක (SDA) නිල බලයෙන් සභාපතිත්වය දරනු ලබන්නේ?", options: ["කලාප අධ්‍යාපන අධ්‍යක්ෂ", "විදුහල්පති", "පළාත් අධ්‍යාපන ලේකම්", "ගුරු නියෝජිතයා"], correct: 1 },
        { q: "දකුණු ආසියාවේ විශාලතම නේවාසික විශ්වවිද්‍යාලය වන්නේ?", options: ["පේරාදෙණිය විශ්වවිද්‍යාලය", "කොළඹ විශ්වවිද්‍යාලය", "ජයවර්ධනපුර විශ්වවිද්‍යාලය", "රුහුණු විශ්වවිද්‍යාලය"], correct: 0 },
        { q: "අධ්‍යාපනය යනු මිනිසා තුළ දැනටමත් පවතින දේවත්වය ප්‍රකට කිරීමයි' යැයි පැවසුවේ කවුද?", options: ["මහත්මා ගාන්ධි", "රබීන්ද්‍රනාත් තාගෝර්", "ස්වාමි විවේකානන්ද", "ප්ලේටෝ"], correct: 2 },
        { q: "ගුරු උපදේශක සේවය (Teacher Advisor Service) අයත් වන සේවා ගණය වන්නේ?", options: ["අධ්‍යාපන පරිපාලන සේවය", "ගුරු අධ්‍යාපනඥ සේවය", "ගුරු සේවය", "විශේෂ සේවා ගණය"], correct: 1 },
        { q: "වෘත්තීය විෂය ධාරාවට (Vocational Stream) අයත් විෂය ක්ෂේත්‍ර ගණන කොපමණද?", options: ["20", "26", "13", "15"], correct: 1 },
        { q: "ගුරු විද්‍යාලයක (Teachers' College) පාඨමාලා කාලය සාමාන්‍යයෙන් වසර කීයද?", options: ["වසර 03", "වසර 02", "වසර 01", "මාස 06"], correct: 1 },
        { q: "මනෝවිද්‍යාවට අනුව 'සහජාත බුද්ධිය' (Innate Intelligence) පිළිබඳ සංකල්පය ඉදිරිපත් කළේ?", options: ["හොවාර්ඩ් ගාඩ්නර්", "සිග්මන්ඩ් ෆ්‍රොයිඩ්", "රේමන්ඩ් කැටෙල්", "ජේ.පී. ගිල්ෆර්ඩ්"], correct: 2 },
        { q: "අධ්‍යාපන අමාත්‍යාංශය මගින් නිකුත් කරනු ලබන වාර සඟරාව වන්නේ?", options: ["ඉසුරු", "නැණස", "අධ්‍යාපන පුවත්", "පාසල"], correct: 0 }
    ];

    let currentIdx = 0;
    let score = 0;
    let answersLog = [];

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById("current-q-num").innerText = currentIdx + 1;
        document.getElementById("question-text").innerText = q.q;
        const list = document.getElementById("options-list");
        list.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = (i+1) + ". " + opt;
            btn.onclick = () => selectOption(i, btn);
            list.appendChild(btn);
        });
    }

    function selectOption(index, element) {
        const correct = questions[currentIdx].correct;
        const options = document.querySelectorAll(".option");
        
        options.forEach(btn => btn.style.pointerEvents = "none");

        if(index === correct) {
            element.classList.add("correct");
            score++;
        } else {
            element.classList.add("wrong");
            options[correct].classList.add("correct");
        }

        answersLog.push({ q: questions[currentIdx].q, ans: questions[currentIdx].options[correct] });
        document.getElementById("next-btn").style.display = "block";
        if(currentIdx === questions.length - 1) document.getElementById("next-btn").innerText = "ප්‍රතිඵල බලන්න (FINISH)";
    }

    function handleNext() {
        currentIdx++;
        if(currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-area").classList.add("hidden");
        document.getElementById("result-area").classList.remove("hidden");
        const percent = (score / questions.length) * 100;
        document.getElementById("final-score").innerText = `නිවැරදි පිළිතුරු: ${score} / ${questions.length} (${percent}%)`;
        
        let summary = "<strong>පිළිතුරු සාරාංශය:</strong><br><br>";
        answersLog.forEach((item, i) => {
            summary += `<div class='summary-item'>${i+1}. ${item.q}<br><span style='color:#27ae60; font-weight:bold;'>නිවැරදි පිළිතුර: ${item.ans}</span></div>`;
        });
        document.getElementById("summary-content").innerHTML = summary;
    }

    loadQuestion();
</script>
</body>
</html>
