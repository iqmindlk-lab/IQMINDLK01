    <title>IQ MIND - IQ Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #001f3f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #00a8ff; width: 100%; max-width: 500px; border-radius: 30px; padding: 25px; text-align: center; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }

        .header-text small { font-size: 14px; opacity: 0.9; }

        .q-count { font-size: 18px; margin-bottom: 10px; font-weight: 500; }
        .question { font-size: 19px; font-weight: bold; margin-bottom: 25px; line-height: 1.5; min-height: 70px; text-align: left; }
        .option { background: white; color: #333; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; border: none; width: 100%; font-size: 16px; text-align: left; padding-left: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        
        .next-btn { background: #1877F2; color: white; padding: 16px; width: 100%; border: none; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 17px; display: none; }
        
        .result-box { text-align: left; background: white; color: #333; padding: 20px; border-radius: 20px; margin-top: 20px; max-height: 350px; overflow-y: auto; }
        .summary-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 14px; }
        
        .button-container { text-align: center; width: 100%; margin-top: 20px; }
        .fb-btn { background: #1877F2; color: white; padding: 15px 30px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; display: inline-block; text-decoration: none; transition: 0.3s; }
        .fb-btn:hover { background: #145dbf; transform: scale(1.03); }
        
        .home-btn { background: white; color: #333; padding: 15px; width: 100%; border: 1px solid #ddd; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; display: block; text-decoration: none; }

<body>

<div class="container">
    <div class="header">

            <small>බුද්ධි පරීක්ෂණය (IQ Quiz)</small>

        <div id="options-list"></div>
        <button id="next-btn" class="next-btn" onclick="handleNext()">මීළඟ ප්‍රශ්නය</button>
    </div>

    <div id="result-area" class="hidden">
        <h2 style="margin:0; font-size: 26px;">ප්‍රතිඵලය</h2>

        <div class="button-container">
            <a href="https://www.facebook.com/iqmind.lk" target="_blank" class="fb-btn">
                Follow IQ MIND on Facebook
            </a>
        </div>
        
        <button class="home-btn" onclick="window.location.reload()">නැවත උත්සාහ කරන්න</button>
    </div>
</div>

<script>
    const questions = [
        { q: "පියෙකුට පුතුන් පස් දෙනෙකි. සෑම පුතෙකුටම එක් සහෝදරිය බැගින් සිටී නම්, එම පවුලේ සිටින මුළු දරුවන් ගණන කීයද?", options: ["10", "6", "11", "5"], correct: 1 },
        { q: "මීට වසර 3කට පෙර අමල් සහ නිමල්ගේ වයස්වල එකතුව වසර 18කි. තවත් වසර 3කට පසු ඔවුන් දෙදෙනාගේ වයස්වල එකතුව කීයද?", options: ["21", "24", "27", "30"], correct: 3 },
        { q: "පේළියක සිටගෙන සිටින ළමුන් පිරිසක් අතරින් 'සමන්' ඉදිරියේ සිට 7 වැන්නා වන අතර පිටුපස සිට 12 වැන්නා වේ. පේළියේ සිටින මුළු ළමුන් ගණන කීයද?", options: ["19", "18", "20", "17"], correct: 1 },
        { q: "අද අඟහරුවාදා නම්, අද සිට දින 62කට පසු එළඹෙන දිනය කුමක්ද?", options: ["සඳුදා", "ඉරිදා", "සෙනසුරාදා", "බදාදා"], correct: 0 },
        { q: "A යනු B ගේ සහෝදරියයි. C යනු B ගේ මවයි. D යනු C ගේ පියායි. එසේ නම් A ට D වන්නෙ කවුද?", options: ["සීයා", "මාමා", "පියා", "සහෝදරයා"], correct: 0 },
        { q: "ඔරලෝසුවක වේලාව 3:15 වන විට, මිනිත්තු කට්ට සහ පැය කට්ට අතර කෝණය කීයද?", options: ["0°", "7.5°", "15°", "10°"], correct: 1 },
        { q: "එක්තරා රහස් භාෂාවකින් 'TEACHER' යන්න 'VGCEJGT' ලෙස ලියන්නේ නම්, 'STUDENT' යන්න එම භාෂාවෙන් ලියන්නේ කෙසේද?", options: ["UVWFGPU", "TVVFGOT", "UVVFGPU", "UWVFGPU"], correct: 2 },
        { q: "කූඩයක ඇති මල් සංඛ්‍යාව සෑම විනාඩියකටම දෙගුණ වේ. විනාඩි 60කදී කූඩය පිරී යයි නම්, කූඩයෙන් භාගයක් පිරීමට ගතවන කාලය කොපමණද?", options: ["විනාඩි 30", "විනාඩි 59", "විනාඩි 45", "විනාඩි 15"], correct: 1 },
        { q: "බළලුන් 5 දෙනෙකුට මීයන් 5 දෙනෙකු ඇල්ලීමට විනාඩි 5ක් ගතවේ නම්, බළලුන් 100 දෙනෙකුට මීයන් 100 දෙනෙකු ඇල්ලීමට ගතවන කාලය කොපමණද?", options: ["විනාඩි 100", "විනාඩි 50", "විනාඩි 5", "විනාඩි 25"], correct: 2 },
        { q: "කමල් නිමල්ට වඩා උසය. නිමල් සුනිල්ට වඩා උසය. විමල් කමල්ට වඩා උසය. මෙහි මධ්‍යම උසක් ඇත්තේ කාටද?", options: ["කමල්", "නිමල්", "සුනිල්", "විමල්"], correct: 0 },
        { q: "ගොවියෙකු සතුව සතුන් 17 දෙනෙකු සිටී. නව දෙනෙකු හැර අනෙක් සියලුම සතුන් මිය ගියේ නම්, දැන් ඔහු සතුව ජීවතුන් අතර සිටින සතුන් ගණන කීයද?", options: ["8", "9", "17", "0"], correct: 1 },
        { q: "වෛද්‍යවරයෙක් ඔබට පෙති 3ක් ලබා දී සෑම පැය භාගයකටම වරක් එක බැගින් බොන්නැයි පවසයි. සියලුම පෙති බී අවසන් කිරීමට ඔබට ගතවන කාලය කොපමණද?", options: ["පැය 1 1/2", "පැය 1", "පැය 2", "මිනිත්තු 30"], correct: 1 },
        { q: "උදෑසන සූර්යයා දෙසට මුහුණලා සිටින අජිත්, තම දකුණු පසට හැරී මීටර් 10ක් ගමන් කරයි. දැන් ඔහු ගමන් කරමින් සිටින්නේ කුමන දිශාවටද?", options: ["උතුර", "දකුණ", "නැගෙනහිර", "බටහිර"], correct: 1 },
        { q: "සමචතුරස්‍රයක පැත්තක දිග 10% කින් වැඩි කළහොත් එහි වර්ගඵලය වැඩිවන ප්‍රතිශතය කීයද?", options: ["10%", "20%", "21%", "100%"], correct: 2 },
        { q: "රුපියල් 2ට ටොෆි 3ක් මිලදී ගෙන, ටොෆි 2ක් රුපියල් 3ට විකුණනු ලබයි නම් ලැබෙන ලාභ ප්‍රතිශතය කීයද?", options: ["50%", "100%", "125%", "150%"], correct: 2 },
        { q: "ගොඩනැගිල්ලක 10 වන තට්ටුවට යාමට විදුලි සෝපානයට තත්පර 18ක් ගතවේ නම්, 5 වන තට්ටුවට යාමට ගතවන කාලය කොපමණද?", options: ["තත්පර 9", "තත්පර 8", "තත්පර 10", "තත්පර 7"], correct: 1 },
        { q: "ඡායාරූපයක සිටින පිරිමි පුද්ගලයෙකු පෙන්වමින් කාන්තාවක් පවසයි: 'මොහුගේ සහෝදරයාගේ පියා, මගේ සීයාගේ එකම පුත්‍රයාය'. එම කාන්තාවට ඔහු කවුද?", options: ["පියා", "සහෝදරයා", "පුතා", "මාමා"], correct: 1 },
        { q: "බස් රථයක මගීන් 40ක් සිටිති. පළමු නැවතුමේදී 10ක් බැස 5ක් නැගුණි. දෙවන නැවතුමේදී 2ක් බැස 7ක් නැගුණි. දැන් සිටින මගීන් ගණන?", options: ["40", "35", "42", "38"], correct: 0 },
        { q: "පෙට්ටියක රතු 5, නිල් 4 සහ කොළ පන්දු 3ක් ඇත. නොබලා අවම වශයෙන් පන්දු කීයක් ගතහොත් එකම වර්ණයෙන් පන්දු 2ක් අනිවාර්යයෙන්ම ලැබේද?", options: ["2", "3", "4", "5"], correct: 2 },
        { q: "මීටර් 10ක රෙදි කැබැල්ලක් මීටර් 1 බැගින් කැපීමට (එක් කැපුමකට මිනිත්තුවක් ගතවේ නම්) ගතවන මුළු කාලය කොපමණද?", options: ["විනාඩි 10", "විනාඩි 9", "විනාඩි 11", "විනාඩි 8"], correct: 1 }
    ];

    let currentIdx = 0;
    let score = 0;
    let answersLog = [];

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById("current-q-num").innerText = currentIdx + 1;
        document.getElementById("question-text").innerText = q.q;
        const list = document.getElementById("options-list");
        list.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = (i+1) + ". " + opt;
            btn.onclick = () => selectOption(i, btn);
            list.appendChild(btn);
        });
    }

    function selectOption(index, element) {
        const correctIdx = questions[currentIdx].correct;
        const options = document.querySelectorAll(".option");
        options.forEach(btn => btn.style.pointerEvents = "none");

        if(index === correctIdx) {
            element.classList.add("correct");
            score++;
        } else {
            element.classList.add("wrong");
            options[correctIdx].classList.add("correct");
        }

        answersLog.push({ q: questions[currentIdx].q, correct: questions[currentIdx].options[correctIdx] });
        document.getElementById("next-btn").style.display = "block";
        if(currentIdx === questions.length - 1) document.getElementById("next-btn").innerText = "ප්‍රතිඵල බලන්න";
    }

    function handleNext() {
        currentIdx++;
        if(currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-area").classList.add("hidden");
        document.getElementById("result-area").classList.remove("hidden");
        const percent = Math.round((score / questions.length) * 100);
        document.getElementById("final-score").innerText = `නිවැරදි පිළිතුරු: ${score} / ${questions.length} (${percent}%)`;
        
        let summaryHtml = "<strong>නිවැරදි පිළිතුරු පත්‍රය:</strong><br><br>";
        answersLog.forEach((item, i) => {
            summaryHtml += `<div class='summary-item'>${i+1}. ${item.q}<br><span style='color:#27ae60; font-weight:bold;'>නිවැරදි පිළිතුර: ${item.correct}</span></div>`;
        });
        document.getElementById("summary-content").innerHTML = summaryHtml;
    }

    loadQuestion();
</script>
</body>
</html>
