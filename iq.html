<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JBMB0SY8T6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-JBMB0SY8T6');
    </script>

    <title>IQ MIND - GK Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #001f3f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #00a8ff; width: 100%; max-width: 400px; border-radius: 30px; padding: 25px; text-align: center; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.4); position: relative; }

        .header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }
        .logo-small { width: 60px; height: 60px; border-radius: 50%; background: white; margin-right: 15px; border: 2px solid white; object-fit: cover; cursor: pointer; }
        .header-text { text-align: left; }
        .header-text strong { font-size: 22px; display: block; }
        .header-text small { font-size: 14px; opacity: 0.9; }

        .q-count { font-size: 18px; margin-bottom: 10px; font-weight: 500; }
        .question { font-size: 20px; font-weight: bold; margin-bottom: 25px; line-height: 1.5; min-height: 70px; text-align: left; }
        .option { background: white; color: #333; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; border: none; width: 100%; font-size: 16px; text-align: left; padding-left: 25px; }

        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }

        .next-btn { background: #1877F2; color: white; padding: 16px; width: 100%; border: none; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 17px; display: none; }

        .result-box { text-align: left; background: white; color: #333; padding: 20px; border-radius: 20px; margin-top: 20px; max-height: 250px; overflow-y: auto; }

        .summary-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 14px; }

        .home-btn { background: white; color: #333; padding: 15px; width: 100%; border: 1px solid #ddd; border-radius: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; }

        .hidden { display: none; }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="logo.png" class="logo-small" onclick="goHome()" alt="Logo">
        <div class="header-text">
            <strong>IQ MIND</strong>
            <small>General Knowledge Quiz</small>
        </div>
    </div>

    <div id="quiz-area">
        <div class="q-count">Question <span id="current-q-num">1</span> of 20</div>
        <div class="question" id="question-text"></div>
        <div id="options-list"></div>
        <button id="next-btn" class="next-btn" onclick="handleNext()">NEXT QUESTION</button>
    </div>

    <div id="result-area" class="hidden">
        <h2>Quiz Completed!</h2>
        <h3 id="final-score"></h3>

        <div class="result-box" id="summary-content"></div>

        <button class="home-btn" onclick="goHome()">🏠 Home</button>
    </div>

</div>

<script>
function goHome(){
    window.location.href = "index.html";
}

const questions = [
    { q: "ශ්‍රී ලංකාවේ නොමිලේ පෙළපොත් ලබා දීමේ වැඩසටහන ආරම්භ කරන ලද්දේ කුමන වර්ෂයේදීද?", options: ["1945","1980","1951","1990"], correct: 1 },
    { q: "ළමා අයිතිවාසිකම් පිළිබඳ ප්‍රඥප්තිය (UNCRC) සම්මත කළේ කවදාද?", options: ["1989","1990","1948","1950"], correct: 0 }
];

let currentIdx = 0;
let score = 0;
let answersLog = [];

function loadQuestion(){
    const q = questions[currentIdx];
    document.getElementById("current-q-num").innerText = currentIdx + 1;
    document.getElementById("question-text").innerText = q.q;

    const list = document.getElementById("options-list");
    list.innerHTML = "";
    document.getElementById("next-btn").style.display = "none";

    q.options.forEach((opt,i)=>{
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => selectOption(i,btn);
        list.appendChild(btn);
    });
}

function selectOption(index,element){
    const correctIdx = questions[currentIdx].correct;
    const options = document.querySelectorAll(".option");

    options.forEach(b=>b.style.pointerEvents="none");

    let isCorrect = index === correctIdx;

    if(isCorrect){
        element.classList.add("correct");
        score++;
    } else {
        element.classList.add("wrong");
        options[correctIdx].classList.add("correct");
    }

    answersLog.push({
        q: questions[currentIdx].q,
        correct: questions[currentIdx].options[correctIdx],
        isCorrect: isCorrect
    });

    document.getElementById("next-btn").style.display = "block";
}

function handleNext(){
    currentIdx++;
    if(currentIdx < questions.length){
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults(){
    document.getElementById("quiz-area").classList.add("hidden");
    document.getElementById("result-area").classList.remove("hidden");

    const percent = Math.round((score/questions.length)*100);
    document.getElementById("final-score").innerText =
        `Score: ${score}/${questions.length} (${percent}%)`;

    let html = "<strong>Wrong Answers Only:</strong><br><br>";

    answersLog.forEach((item,i)=>{
        if(!item.isCorrect){
            html += `
            <div class='summary-item'>
                ${i+1}. ${item.q}<br>
                <span style='color:red;font-weight:bold'>
                    Correct: ${item.correct}
                </span>
            </div>`;
        }
    });

    document.getElementById("summary-content").innerHTML = html;
}

loadQuestion();
</script>

</body>
</html>
