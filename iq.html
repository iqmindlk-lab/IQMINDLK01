let questions = [];
let currentIdx = 0;
let score = 0;
let answersLog = [];

function prepareQuestions() {
    let allQuestions = [...quizData];
    for (let i = allQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
    }
    questions = allQuestions.slice(0, 10);
}

function loadQuestion(){
    const q = questions[currentIdx];
    document.getElementById("current-q-num").innerText = currentIdx + 1;
    document.getElementById("question-text").innerText = q.q;
    const list = document.getElementById("options-list");
    list.innerHTML = "";
    document.getElementById("next-btn").style.display = "none";
    q.options.forEach((opt,i)=>{
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => selectOption(i,btn);
        list.appendChild(btn);
    });
}

function selectOption(index,element){
    const correctIdx = questions[currentIdx].correct;
    const options = document.querySelectorAll(".option");
    options.forEach(b=>b.style.pointerEvents="none");
    let isCorrect = index === correctIdx;
    if(isCorrect){
        element.classList.add("correct");
        score++;
    } else {
        element.classList.add("wrong");
        options[correctIdx].classList.add("correct");
    }
    answersLog.push({ q: questions[currentIdx].q, correct: questions[currentIdx].options[correctIdx], isCorrect: isCorrect });
    document.getElementById("next-btn").style.display = "block";
}

function handleNext(){
    currentIdx++;
    if(currentIdx < questions.length){
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults(){
    document.getElementById("quiz-area").classList.add("hidden");
    document.getElementById("result-area").classList.remove("hidden");
    const percent = Math.round((score/questions.length)*100);
    document.getElementById("final-score").innerText = `Score: ${score}/${questions.length} (${percent}%)`;
    let html = "<strong>Wrong Answers Only:</strong><br><br>";
    let hasWrong = false;
    answersLog.forEach((item)=>{
        if(!item.isCorrect){
            hasWrong = true;
            html += `<div class='summary-item'>${item.q}<br><span style='color:red;font-weight:bold'>Correct: ${item.correct}</span></div>`;
        }
    });
    document.getElementById("summary-content").innerHTML = hasWrong ? html : "All correct! Well done.";
}

// නැවත ආරම්භ කිරීමේ function එක
function restartQuiz() {
    currentIdx = 0;
    score = 0;
    answersLog = [];
    document.getElementById("result-area").classList.add("hidden");
    document.getElementById("quiz-area").classList.remove("hidden");
    prepareQuestions();
    loadQuestion();
}

prepareQuestions();
loadQuestion();
</script>
